// ============================================================
// OpenArena memtest benchmark server config
// Loaded automatically by the engine after default.cfg.
// ============================================================

// --- Server identity ---
set sv_hostname     "OA-memtest-bench"
set sv_maxclients   8

// --- Game rules: Free For All, run forever ---
set g_gametype      0       // 0 = FFA
set fraglimit       0       // never end on frags
set timelimit       0       // never end on time
set capturelimit    0

// --- Bots ---
set bot_enable      1
set bot_nochat      1       // silence bot chatter (saves log noise)
set g_spSkill       3       // skill 1-5; 3 = medium
set g_forcerespawn  1       // instant respawn, keeps bots active

// 4 bots — enough to exercise AI, pathfinding, and collision every frame
set bot_minplayers  4

// --- Tick rate ---
set sv_fps          60      // server simulation rate (default is 20 — too slow for benchmarking)

// --- Physics / simulation ---
set g_speed         320
set g_gravity       800
set g_knockback     1000

// --- Network: loopback only, no master server heartbeats ---
set sv_master1      ""
set sv_master2      ""
set sv_master3      ""
set sv_master4      ""
set sv_master5      ""
set dedicated       2       // 2 = LAN only (suppresses internet master pings)

// --- Silence non-essential output to keep bench logs clean ---
set developer       0
set logfile         0
